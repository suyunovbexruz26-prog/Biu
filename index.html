<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Of Love - Chizilgan Odamcha</title>
    <style>
        /* ASOSIY FON */
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* OQ KONTEYNER */
        .stage {
            position: relative;
            width: 360px;
            height: 580px;
            background-color: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
        }

        /* SARLAVHA MATNI */
        .header-text {
            font-size: 24px;
            font-weight: bold;
            color: #111;
            margin-top: 10px;
            margin-bottom: auto;
        }

        /* YURAK CHIZILADIGAN MAYDON */
        .heart-canvas {
            position: absolute;
            width: 200px;
            height: 200px;
            top: 140px;
        }

        /* KICHIK YURAKCHALAR (Piksel) */
        .heart-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #C4090B;
            transform: rotate(-45deg);
            opacity: 0;
            animation: appear 0.4s ease forwards;
        }

        /* Yurakchaning tepa qismlari */
        .heart-dot::before,
        .heart-dot::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #C4090B;
            border-radius: 50%;
        }

        .heart-dot::before { top: -6px; left: 0; }
        .heart-dot::after { left: 6px; top: 0; }

        /* ODAMCHA VA MATN ZONASI (Joylashuv) */
        .action-zone {
            position: absolute;
            bottom: 140px;
            left: 35px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
        }

        /* CHIZILGAN ODAMCHA (SVG uslubi) */
        .stick-figure {
            width: 70px;
            height: 90px;
        }

        .stick-figure svg {
            width: 100%;
            height: 100%;
        }

        /* "biu" MATNI */
        .biu-container {
            font-size: 20px;
            font-weight: bold;
            color: #444;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        /* PASTDAGI KATTA "I Love You" YOZUVI */
        .final-message {
            font-size: 36px;
            font-weight: bold;
            color: #C4090B;
            margin-top: auto;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 1s ease forwards;
            animation-delay: 3.5s;
        }

        /* =========================================
           ANIMATSIYALAR
           ========================================= */
        
        /* Yurakchalar paydo bo'lishi */
        @keyframes appear {
            0% { transform: rotate(-45deg) scale(0); opacity: 0; }
            100% { transform: rotate(-45deg) scale(1); opacity: 1; }
        }

        /* Matn pastdan tepaga chiqishi */
        @keyframes slideUp {
            100% { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="stage">
        <div class="header-text">Heart Of Love</div>

        <div class="heart-canvas" id="heartCanvas"></div>

        <div class="action-zone">
            <div class="stick-figure">
                <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="25" r="15" stroke="black" stroke-width="4" fill="none"/>
                    <line x1="50" y1="40" x2="50" y2="80" stroke="black" stroke-width="4"/>
                    <line x1="50" y1="50" x2="85" y2="50" stroke="black" stroke-width="4" stroke-linecap="round"/>
                    <line x1="50" y1="50" x2="20" y2="60" stroke="black" stroke-width="4" stroke-linecap="round"/>
                    <line x1="50" y1="80" x2="30" y2="110" stroke="black" stroke-width="4"/>
                    <line x1="50" y1="80" x2="70" y2="110" stroke="black" stroke-width="4"/>
                </svg>
            </div>
            <div class="biu-container">
                biu~
            </div>
        </div>

        <div class="final-message">I Love You</div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        
        function drawHeart() {
            // Yurak formulasini chizish
            for (let t = 0; t <= 2 * Math.PI; t += 0.12) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                const dot = document.createElement('div');
                dot.className = 'heart-dot';
                
                // Joylashuvni markazga nisbatan moslash
                const posX = x * 6 + 100;
                const posY = y * 6 + 100;

                dot.style.left = posX + 'px';
                dot.style.top = posY + 'px';

                dot.style.animationDelay = (t * 0.5) + 's';

                canvas.appendChild(dot);
            }
        }

        // Sahifa yuklangandan 0.5 soniya o'tib chizishni boshlash
        window.onload = function() {
            setTimeout(drawHeart, 500);
        };
    </script>
</body>
</html>
